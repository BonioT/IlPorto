        .wa-float {
            position: fixed; width: 60px; height: 60px; bottom: 20px; right: 20px; background-color: #25d366;
            color: #FFF; border-radius: 50px; text-align: center; font-size: 30px; box-shadow: 2px 2px 5px rgba(0,0,0,0.3); z-index: 10000;
            display: flex; align-items: center; justify-content: center; text-decoration: none; transition: 0.3s;
        }

        .container { max-width: 1100px; margin: 30px auto; padding: 20px; }
        .section-title { text-align: center; color: var(--primary); margin-bottom: 25px; text-transform: uppercase; font-weight: 700; }

        /* SERVIZI */
        .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 15px; text-align: center; margin-bottom: 40px; background: white; padding: 20px; border-radius: 15px; }
        .service-item i { color: var(--primary); font-size: 1.5rem; margin-bottom: 8px; }
        .service-item p { font-size: 0.8rem; font-weight: 600; margin: 0; }

        /* CAROSELLO STILE INSTAGRAM */
        .instagram-slider {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            gap: 10px;
            padding: 10px 0;
            scrollbar-width: none; /* Nasconde scrollbar su Firefox */
        }
        .instagram-slider::-webkit-scrollbar { display: none; } /* Nasconde scrollbar su Chrome/Safari */

        .instagram-slider a {
            flex: 0 0 85%; /* Occupa l'85% della larghezza su mobile */
            scroll-snap-align: center;
            height: 400px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        @media (min-width: 768px) {
            .instagram-slider a { flex: 0 0 30%; height: 450px; } /* 3 foto visibili su PC */
        }
        .instagram-slider img { width: 100%; height: 100%; object-fit: cover; }

        /* MAPPA */
        .map-container { margin-top: 40px; border-radius: 15px; overflow: hidden; height: 350px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        footer { background: var(--primary); color: white; text-align: center; padding: 40px 20px; margin-top: 50px; }
        .btn-direct { display: inline-block; background: var(--accent); color: white; padding: 12px 25px; border-radius: 50px; text-decoration: none; margin-top: 15px; font-weight: 600; }
    </style>
